<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PBGO Wiki</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f1115;
            color: #ffffff;
        }

        header {
            background-color: #1b1f2a;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 40px;
        }

        p {
            color: #b5b5b5;
        }

        .container {
            padding: 30px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background-color: #1b1f2a;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
        }

        .card:hover {
            background-color: #242a38;
        }

        a {
            color: #4da3ff;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <h1>PBGO Wiki</h1>
    <p>Fan-made wiki for PolandBall GO</p>
</header>

<div class="container">

    <div class="card">
        <h2>🌍 Countries</h2>
        <p>List of all countries in PBGO.</p>
    </div>

    <div class="card">
        <h2>⚙️ Mechanics</h2>
        <p>How the game works.</p>
    </div>

    <div class="card">
        <h2>📜 Events</h2>
        <p>Historical wars and community events.</p>
    </div>

    <div class="card">
        <h2>📖 Guides</h2>
        <p>For new players.</p>
    </div>

</div>

</body>
</html>
